<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Web RPG Game</title>

  <style>
  * {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  overflow-x: hidden;

  background:
    radial-gradient(circle at 20% 20%, rgba(37, 99, 235, 0.35), transparent 30%),
    radial-gradient(circle at 80% 10%, rgba(168, 85, 247, 0.35), transparent 28%),
    radial-gradient(circle at 50% 90%, rgba(16, 185, 129, 0.22), transparent 35%),
    linear-gradient(135deg, #020617, #0f172a 45%, #111827);
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(white 1px, transparent 1px);
  background-size: 80px 80px, 140px 140px;
  background-position: 0 0, 40px 60px;
  opacity: 0.12;
  pointer-events: none;
  animation: starsMove 25s linear infinite;
}

@keyframes starsMove {
  from {
    transform: translateY(0);
  }
  to {
    transform: translateY(80px);
  }
}

.container {
  position: relative;
  width: 92%;
  max-width: 560px;
  margin: 35px auto;
  padding: 24px;
  border-radius: 24px;

  background: rgba(15, 23, 42, 0.88);
  border: 1px solid rgba(96, 165, 250, 0.35);
  box-shadow:
    0 0 25px rgba(37, 99, 235, 0.35),
    0 0 60px rgba(168, 85, 247, 0.22),
    inset 0 0 20px rgba(255, 255, 255, 0.04);

  backdrop-filter: blur(8px);
}

.container::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 26px;
  background: linear-gradient(135deg, #60a5fa, #a855f7, #22c55e, #60a5fa);
  z-index: -1;
  opacity: 0.55;
  filter: blur(10px);
}

h1 {
  margin-top: 8px;
  margin-bottom: 22px;
  color: #93c5fd;
  font-size: 34px;
  letter-spacing: 3px;
  text-shadow:
    0 0 8px rgba(96, 165, 250, 0.9),
    0 0 18px rgba(96, 165, 250, 0.7),
    0 0 35px rgba(168, 85, 247, 0.5);
}

h1::before {
  content: "⚔️ ";
}

h1::after {
  content: " 💎";
}

h2 {
  margin-top: 4px;
  color: #e0f2fe;
  text-shadow: 0 0 10px rgba(125, 211, 252, 0.45);
}

.box {
  position: relative;
  background:
    linear-gradient(180deg, rgba(51, 65, 85, 0.95), rgba(30, 41, 59, 0.95));
  margin-top: 16px;
  padding: 18px;
  border-radius: 18px;

  border: 1px solid rgba(148, 163, 184, 0.25);
  box-shadow:
    0 8px 18px rgba(0, 0, 0, 0.35),
    inset 0 0 16px rgba(255, 255, 255, 0.04);
}

.box::before {
  content: "";
  position: absolute;
  left: 15px;
  right: 15px;
  top: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(147, 197, 253, 0.8), transparent);
}

#loginBox {
  border: 1px solid rgba(96, 165, 250, 0.45);
}

#gameBox .box:first-child {
  border: 1px solid rgba(34, 197, 94, 0.45);
}

input {
  width: 88%;
  padding: 13px 14px;
  margin: 7px;
  border-radius: 12px;
  border: 1px solid rgba(148, 163, 184, 0.35);
  font-size: 15px;

  color: white;
  background: rgba(15, 23, 42, 0.92);
  outline: none;
  box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.35);
}

input::placeholder {
  color: #94a3b8;
}

input:focus {
  border-color: #60a5fa;
  box-shadow:
    0 0 0 3px rgba(96, 165, 250, 0.2),
    0 0 18px rgba(96, 165, 250, 0.35);
}

button {
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  color: white;
  border: none;
  padding: 13px 19px;
  border-radius: 13px;
  font-size: 15px;
  margin: 6px;
  cursor: pointer;

  border-bottom: 3px solid rgba(0, 0, 0, 0.3);
  box-shadow:
    0 0 14px rgba(37, 99, 235, 0.45),
    0 7px 14px rgba(0, 0, 0, 0.35);

  transition: transform 0.15s ease, filter 0.15s ease, box-shadow 0.15s ease;
}

button::before {
  content: "";
  position: absolute;
  top: 0;
  left: -80%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
  transform: skewX(-20deg);
}

button:hover::before {
  animation: shine 0.7s ease;
}

@keyframes shine {
  from {
    left: -80%;
  }
  to {
    left: 130%;
  }
}

button:hover {
  filter: brightness(1.15);
  box-shadow:
    0 0 20px rgba(96, 165, 250, 0.65),
    0 9px 18px rgba(0, 0, 0, 0.4);
}

button:active {
  transform: scale(0.96);
}

.logout {
  background: linear-gradient(135deg, #dc2626, #991b1b);
  box-shadow:
    0 0 14px rgba(220, 38, 38, 0.5),
    0 7px 14px rgba(0, 0, 0, 0.35);
}

p {
  font-size: 16px;
  line-height: 1.6;
}

span {
  color: #facc15;
  font-weight: bold;
  text-shadow: 0 0 8px rgba(250, 204, 21, 0.45);
}

#loginMessage,
#message {
  margin-top: 16px;
  color: #dbeafe;
  background: rgba(15, 23, 42, 0.6);
  padding: 10px;
  border-radius: 12px;
  border: 1px solid rgba(96, 165, 250, 0.2);
}

@media (max-width: 480px) {
  .container {
    width: 94%;
    margin: 20px auto;
    padding: 18px;
  }

  h1 {
    font-size: 27px;
  }

  button {
    width: 85%;
  }

  input {
    width: 92%;
  }
}

    .container {
      width: 90%;
      max-width: 520px;
      margin: 30px auto;
      padding: 20px;
      background: #1f2937;
      border-radius: 15px;
    }

    h1 {
      color: #60a5fa;
    }

    .box {
      background: #374151;
      margin-top: 15px;
      padding: 15px;
      border-radius: 12px;
    }

    input {
      width: 85%;
      padding: 12px;
      margin: 6px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 15px;
      margin: 5px;
    }

    button:active {
      background: #1d4ed8;
      transform: scale(0.97);
    }

    .logout {
      background: #dc2626;
    }

    #gameBox {
      display: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Web RPG</h1>

    <div id="loginBox" class="box">
      <h2>로그인</h2>

      <input id="email" type="email" placeholder="이메일">
      <input id="password" type="password" placeholder="비밀번호">

      <br>

      <button onclick="signUp()">회원가입</button>
      <button onclick="loginEmail()">이메일 로그인</button>
      <button onclick="loginGoogle()">Google 로그인</button>

      <p id="loginMessage">로그인하면 게임 데이터가 Firebase에 저장됩니다.</p>
    </div>

    <div id="gameBox">
      <div class="box">
        <p>닉네임: <span id="nickname">플레이어</span></p>
        <p>칭호: <span id="title">초보자</span></p>
        <p>레벨: <span id="level">1</span></p>
        <p>골드: <span id="gold">0</span></p>
        <p>보석: <span id="gem">0</span></p>
        <p>공격력: <span id="attack">1</span></p>
      </div>

      <div class="box">
        <h2>슬라임</h2>
        <p>체력: <span id="monsterHp">10</span></p>
        <button onclick="attackMonster()">공격하기</button>
      </div>

      <div class="box">
        <h2>강화</h2>
        <button onclick="upgradeAttack()">공격력 강화 10골드</button>
      </div>

      <div class="box">
        <button class="logout" onclick="logout()">로그아웃</button>
        <p id="message">게임을 시작하세요!</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    // 여기 firebaseConfig 부분을 네가 복사한 코드로 바꾸면 됨
    const firebaseConfig = {
  apiKey: "AIzaSyD2bGpScCTe-ltMmDz6mPm1nGIU4ro8ksc",
  authDomain: "web-rpg-game-5e39d.firebaseapp.com",
  projectId: "web-rpg-game-5e39d",
  storageBucket: "web-rpg-game-5e39d.firebasestorage.app",
  messagingSenderId: "573615012828",
  appId: "1:573615012828:web:f1bc4d5e206d4553b6ed19"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    let currentUser = null;

    let gameData = {
      nickname: "플레이어",
      title: "초보자",
      level: 1,
      gold: 0,
      gem: 0,
      attack: 1,
      monsterHp: 10
    };

    function updateUI() {
      document.getElementById("nickname").innerText = gameData.nickname;
      document.getElementById("title").innerText = gameData.title;
      document.getElementById("level").innerText = gameData.level;
      document.getElementById("gold").innerText = gameData.gold;
      document.getElementById("gem").innerText = gameData.gem;
      document.getElementById("attack").innerText = gameData.attack;
      document.getElementById("monsterHp").innerText = gameData.monsterHp;
    }

    function showMessage(text) {
      document.getElementById("message").innerText = text;
    }

    function showLoginMessage(text) {
      document.getElementById("loginMessage").innerText = text;
    }

    async function saveUserData() {
      if (!currentUser) return;

      const userRef = doc(db, "users", currentUser.uid);

      await setDoc(userRef, {
        nickname: gameData.nickname,
        title: gameData.title,
        level: gameData.level,
        gold: gameData.gold,
        gem: gameData.gem,
        attack: gameData.attack,
        monsterHp: gameData.monsterHp,
        updatedAt: serverTimestamp()
      }, { merge: true });
    }

    async function loadUserData(user) {
      const userRef = doc(db, "users", user.uid);
      const userSnap = await getDoc(userRef);

      if (userSnap.exists()) {
        const data = userSnap.data();

        gameData = {
          nickname: data.nickname || user.displayName || "플레이어",
          title: data.title || "초보자",
          level: data.level || 1,
          gold: data.gold || 0,
          gem: data.gem || 0,
          attack: data.attack || 1,
          monsterHp: data.monsterHp || 10
        };
      } else {
        gameData = {
          nickname: user.displayName || "플레이어",
          title: "초보자",
          level: 1,
          gold: 0,
          gem: 0,
          attack: 1,
          monsterHp: 10
        };

        await setDoc(userRef, {
          ...gameData,
          email: user.email || "",
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
      }

      updateUI();
    }

    window.signUp = async function() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        await createUserWithEmailAndPassword(auth, email, password);
        showLoginMessage("회원가입 성공!");
      } catch (error) {
        showLoginMessage("회원가입 실패: " + error.message);
      }
    };

    window.loginEmail = async function() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showLoginMessage("로그인 성공!");
      } catch (error) {
        showLoginMessage("로그인 실패: " + error.message);
      }
    };

    window.loginGoogle = async function() {
      try {
        await signInWithPopup(auth, googleProvider);
        showLoginMessage("Google 로그인 성공!");
      } catch (error) {
        showLoginMessage("Google 로그인 실패: " + error.message);
      }
    };

    window.logout = async function() {
      await signOut(auth);
    };

    window.attackMonster = async function() {
      gameData.monsterHp -= gameData.attack;

      if (gameData.monsterHp <= 0) {
        gameData.gold += 5;
        gameData.level += 1;
        gameData.monsterHp = 10 + gameData.level * 5;

        showMessage("슬라임을 처치했습니다! 골드 +5");
      } else {
        showMessage("슬라임을 공격했습니다!");
      }

      updateUI();
      await saveUserData();
    };

    window.upgradeAttack = async function() {
      if (gameData.gold >= 10) {
        gameData.gold -= 10;
        gameData.attack += 1;

        showMessage("공격력이 증가했습니다!");
      } else {
        showMessage("골드가 부족합니다.");
      }

      updateUI();
      await saveUserData();
    };

    onAuthStateChanged(auth, async function(user) {
      if (user) {
        currentUser = user;

        document.getElementById("loginBox").style.display = "none";
        document.getElementById("gameBox").style.display = "block";

        await loadUserData(user);
        showMessage("로그인 완료! 게임 데이터를 불러왔습니다.");
      } else {
        currentUser = null;

        document.getElementById("loginBox").style.display = "block";
        document.getElementById("gameBox").style.display = "none";
      }
    });
  </script>

</body>
</html>
